version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "${APP_PORT:?APP_PORT must be set}:${APP_PORT:?APP_PORT must be set}"
    volumes:
      - relay-home:/root/.relay

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    ports:
      - "${PORT:?PORT must be set}:${PORT:?PORT must be set}"
    depends_on:
      - backend

volumes:
  relay-home:
